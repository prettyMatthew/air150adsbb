services:
  web:
    build: .
    command: gunicorn -k eventlet -w 1 -b 0.0.0.0:5000 wsgi:app
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: airspotter
      POSTGRES_USER: airspotter
      POSTGRES_PASSWORD: airspotter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  pgdata:
